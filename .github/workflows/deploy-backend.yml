name: Deploy Chatforia Backend

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.API_DO_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.API_DO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend on droplet
        run: |
          ssh ${{ secrets.API_DO_USER }}@${{ secrets.API_DO_HOST }} << 'EOF'
            set -e
            cd /var/www/chatforia-api

            git fetch origin
            git reset --hard origin/main
            git clean -fd

            npm install
            npx prisma generate
            pm2 restart chatforia-api
          EOF